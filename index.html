    <script src="js/access-client.js"></script>
    <script>
    // URL del servidor en Debian
    // Usa Tailscale o IP de tu servidor
    const accessClient = new AccessClient('http://100.65.1.1:3000');
    // O si tienes Tailscale:
    // const accessClient = new AccessClient('http://tu-servidor-tailscale:3000');
  
    // Al usuario hacer login en el juego:
    async function loginJugador(user, pass) {
        try {
          await accessClient.login(user, pass);
          accessClient.startHeartbeat(5 * 60 * 1000); // Latido cada 5 min
    // Inicia el juego...
        } catch (e) {
            alert('Error: ' + e.message);
        }
      }
  
    // Al cerrar:
    window.addEventListener('beforeunload', () => {
        accessClient.logout();
    });
    </script>
